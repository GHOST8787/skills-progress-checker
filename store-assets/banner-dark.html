<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #050505; }
  .banner {
    width: 1400px; height: 560px; position: relative; overflow: hidden;
    background:
      radial-gradient(120% 120% at 12% 50%, rgba(191,148,255,0.16) 0%, rgba(191,148,255,0.04) 30%, transparent 60%),
      radial-gradient(100% 100% at 100% 0%, rgba(94,234,212,0.06) 0%, transparent 55%),
      #050505;
    font-family: "Plus Jakarta Sans", "Noto Sans TC", system-ui, sans-serif;
    display: flex; align-items: center;
  }
  /* 點陣底 */
  .banner::before {
    content: ""; position: absolute; inset: 0;
    background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
    background-size: 24px 24px; opacity: 0.6; pointer-events: none;
  }

  /* 左 1/3：彈窗卡片 */
  .left {
    flex: 0 0 33%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    position: relative; z-index: 2;
  }
  .left .glow {
    position: absolute; width: 360px; height: 360px; border-radius: 50%;
    background: radial-gradient(circle, rgba(191,148,255,0.30) 0%, transparent 70%);
    filter: blur(20px);
  }
  .left img {
    position: relative; height: 472px; width: auto; border-radius: 14px;
    box-shadow: 0 40px 80px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.06);
  }

  /* 右 2/3：介紹 */
  .right { flex: 1 1 auto; padding: 0 72px 0 40px; position: relative; z-index: 2; color: #E2E8F0; }
  .eyebrow {
    font-family: "JetBrains Mono", monospace; font-size: 14px; letter-spacing: 0.18em;
    text-transform: uppercase; color: #BF94FF; margin-bottom: 18px;
    display: inline-flex; align-items: center; gap: 10px;
  }
  .eyebrow .bar { width: 26px; height: 2px; background: #BF94FF; display: inline-block; }
  h1 {
    font-size: 46px; font-weight: 800; line-height: 1.18; color: #fff;
    letter-spacing: 0.01em; margin-bottom: 34px;
  }
  h1 .accent { color: #BF94FF; }
  .feat { list-style: none; display: flex; flex-direction: column; gap: 18px; margin-bottom: 30px; }
  .feat li { display: flex; align-items: center; gap: 16px; }
  .feat .ic {
    flex: 0 0 auto; width: 46px; height: 46px; border-radius: 12px;
    background: rgba(191,148,255,0.10); border: 1px solid rgba(191,148,255,0.22);
    display: flex; align-items: center; justify-content: center;
    color: #BF94FF; font-size: 18px;
  }
  .feat .tx { font-size: 19px; font-weight: 500; color: #E2E8F0; line-height: 1.4; }
  .feat .tx b { color: #fff; font-weight: 700; }
  .foot {
    font-family: "JetBrains Mono", monospace; font-size: 13.5px; color: #8A8F98;
    letter-spacing: 0.03em; display: inline-flex; align-items: center; gap: 12px;
    padding-top: 6px; border-top: 1px solid rgba(255,255,255,0.06); margin-top: 6px;
  }
  .foot i { color: #5EEAD4; }
</style>
</head>
<body>
  <div class="banner">
    <div class="left">
      <div class="glow"></div>
      <img src="popup-card.png" alt="Skills 學程進度彈窗">
    </div>
    <div class="right">
      <span class="eyebrow"><span class="bar"></span>Google 數位人才探索計畫</span>
      <h1>三個學程的進度<br><span class="accent">一眼看完</span></h1>
      <ul class="feat">
        <li>
          <span class="ic"><i class="fa-solid fa-wand-magic-sparkles"></i></span>
          <span class="tx"><b>一鍵掃描全部</b>，自動抓每門課的完成狀態</span>
        </li>
        <li>
          <span class="ic"><i class="fa-solid fa-list-check"></i></span>
          <span class="tx">分學程顯示<b>已完成 / 還缺哪幾門</b></span>
        </li>
        <li>
          <span class="ic"><i class="fa-solid fa-eye-slash"></i></span>
          <span class="tx"><b>隱藏已完成</b>，只專注還沒做的課</span>
        </li>
      </ul>
      <span class="foot"><i class="fa-solid fa-lock"></i>純讀取頁面・不點擊・不送出任何資料</span>
    </div>
  </div>
</body>
</html>
